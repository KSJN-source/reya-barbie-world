// ============= SOUND =============
const SOUND_STYLES = {
  off:       { label:'🔇 No Sound',      icon:'🔇', vol:0,    timbre:'sine',     filter:1000, detune:0 },
  whisper:   { label:'🤫 Whisper Quiet', icon:'🤫', vol:0.04, timbre:'sine',     filter:1500, detune:0 },
  soft:      { label:'🌸 Soft & Mild',   icon:'🌸', vol:0.07, timbre:'sine',     filter:2000, detune:0 },
  gentle:    { label:'🎵 Gentle',        icon:'🎵', vol:0.10, timbre:'sine',     filter:2400, detune:0 },
  musicbox:  { label:'🎼 Music Box',     icon:'🎼', vol:0.08, timbre:'sine',     filter:3500, detune:1200 },
  bells:     { label:'🔔 Bells',         icon:'🔔', vol:0.08, timbre:'sine',     filter:3000, detune:0, harmonic:true },
  warm:      { label:'🌅 Warm Piano',    icon:'🌅', vol:0.10, timbre:'triangle', filter:1600, detune:0 },
  bright:    { label:'✨ Bright',        icon:'✨', vol:0.13, timbre:'triangle', filter:3000, detune:0 },
};
const DEFAULT_STYLE = 'soft';

let audioCtx = null;
const getCtx = () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
};
const N = { C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880, B5:987.77, C6:1046.5, D6:1174.66, E6:1318.51 };

function playTone(freq, dur, style, delay) {
  const cfg = SOUND_STYLES[style] || SOUND_STYLES.soft;
  if (!cfg || cfg.vol === 0) return;
  try {
    const ctx = getCtx();
    const t0 = ctx.currentTime + (delay || 0);
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = cfg.filter;
    filter.Q.value = 0.7;

    // Main oscillator
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = cfg.timbre;
    osc.frequency.value = freq * (cfg.detune ? Math.pow(2, cfg.detune / 1200) : 1);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(cfg.vol, t0 + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur + 0.08);
    osc.connect(filter);
    filter.connect(gain).connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.15);

    // Bell harmonic for bell style
    if (cfg.harmonic) {
      const o2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      o2.type = 'sine';
      o2.frequency.value = freq * 2;
      g2.gain.setValueAtTime(0, t0);
      g2.gain.linearRampToValueAtTime(cfg.vol * 0.4, t0 + 0.04);
      g2.gain.exponentialRampToValueAtTime(0.0001, t0 + dur * 0.6 + 0.08);
      o2.connect(filter);
      filter.connect(g2).connect(ctx.destination);
      o2.start(t0); o2.stop(t0 + dur + 0.15);
    }
  } catch (e) {}
}

const playMelody = (notes, style) =>
  notes.forEach(([f, d, t]) => playTone(f, d, style, t || 0));

// Generic pick-N-options game
function PickNGame({ b, options, onWin, soundStyle, label, color = 'pink',
  feedback, allowRepeats = false, target = null }) {
  const [used, setUsed] = useState({});
  const [last, setLast] = useState(null);
  const [floatItems, setFloatItems] = useState([]);
  const usedCount = Object.values(used).filter(Boolean).length;
  const finalTarget = target || options.length;

  useEffect(() => { if (usedCount >= finalTarget) setTimeout(onWin, 1000); }, [usedCount]);

  const pick = (opt) => {
    if (!allowRepeats && used[opt.id]) return;
    setUsed(u => ({ ...u, [opt.id]: true }));
    setLast(opt);
    SOUNDS[opt.sound || 'pick'](soundStyle);
    if (opt.float) {
      const newItems = Array.from({ length: 4 }, (_, i) => ({
        id: Date.now() + i, char: opt.float,
        x: 30 + Math.random() * 40, y: 80 + Math.random() * 10,
      }));
      setFloatItems(f => [...f, ...newItems]);
      setTimeout(() => setFloatItems(f => f.filter(x => !newItems.find(n => n.id === x.id))), 1500);
    }
  };

  return (
    <div className="w-full flex flex-col items-center gap-3">
      <ProgressBadge color={color}>{label} {usedCount}/{finalTarget}</ProgressBadge>
      <div className="relative">
        <BarbieSVG b={b} size={200} anim={last ? 'animate-bounce' : ''} />
        {floatItems.map(f => (
          <div key={f.id} className="absolute text-4xl pointer-events-none"
            style={{ left: `${f.x}%`, top: `${f.y}%`, animation: 'floatUp 1.5s ease-out forwards' }}>
            {f.char}
          </div>
        ))}

function BathGame({ b, onWin, soundStyle }) {
  const tools = [

    { id:'scrubber', emoji:'🧽', label:'Scrubber', bubble:'✨' },

    { id:'bubbles',  emoji:'🛁', label:'Bubbles',  bubble:'🫧' },

    { id:'sponge',   emoji:'🧻', label:'Sponge',   bubble:'✨' },
  ];
  const [tool, setTool] = useState(tools[0]);
  const [spots, setSpots] = useState(() =>
    Array.from({ length: 6 }, (_, i) => ({
      id: i, x: 25 + Math.random() * 50, y: 55 + Math.random() * 60, clean: false,
    }))
  );
  const [bubbles, setBubbles] = useState([]);
  const remaining = spots.filter(s => !s.clean).length;
  useEffect(() => { if (remaining === 0) setTimeout(onWin, 800); }, [remaining]);

  const cleanSpot = (id, x, y) => {
    setSpots(ss => ss.map(sp => sp.id === id ? { ...sp, clean: true } : sp));
    SOUNDS.splash(soundStyle);
    const newBubbles = Array.from({ length: 5 }, (_, i) => ({
      id: Date.now() + i, x, y, char: tool.bubble,
      dx: (Math.random() - 0.5) * 20, dy: -15 - Math.random() * 15,
    }));
    setBubbles(bb => [...bb, ...newBubbles]);
    setTimeout(() => setBubbles(bb => bb.filter(b => !newBubbles.find(n => n.id === b.id))), 1200);
  };

  return (
    <div className="w-full flex flex-col items-center gap-3">
      <ProgressBadge color="cyan">🛁 Pick a tool, then tap dirt! ({remaining} left)</ProgressBadge>
      <div className="relative">
        <BarbieSVG b={b} size={220} />
        <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 145">
          {spots.map(s => !s.clean && (
            <g key={s.id} onClick={(e) => { e.stopPropagation(); cleanSpot(s.id, s.x, s.y); }}
              style={{ cursor:'pointer', pointerEvents:'all' }}>
              <circle cx={s.x} cy={s.y} r="6" fill="#7d4f00" opacity="0.85" />
              <circle cx={s.x - 1.5} cy={s.y - 1.5} r="2" fill="#5d3a00" opacity="0.85" />
            </g>
          ))}
          {bubbles.map(bub => (
            <text key={bub.id} x={bub.x + bub.dx} y={bub.y + bub.dy} fontSize="6"
              style={{ animation: 'bubbleUp 1.2s ease-out forwards' }}>

          ))}
        </svg>

        <div className="text-center text-sm font-black text-cyan-600 mb-1">Pick a tool: {tool.emoji} {tool.label}</div>

// Salon — pick tool & color
function SalonGame({ b, onWin, soundStyle }) {
  const [hair, setHair] = useState(b.hair);
  const [tool, setTool] = useState('brush');
  const [accessory, setAccessory] = useState(null);
  const [sparkles, setSparkles] = useState([]);
  const [picks, setPicks] = useState({});
  const tools = [
    { id:'brush', emoji:'🪮', label:'Brush' },
    { id:'cut',   emoji:'✂️', label:'Trim' },
    { id:'dye',   emoji:'🎨', label:'Color' },
    { id:'spray', emoji:'💦', label:'Spray' },
    { id:'curl',  emoji:'🌀', label:'Curl' },
    { id:'bow',   emoji:'🎀', label:'Bow' },
  ];
  const colors = ['#f4d03f','#fdfefe','#5d4037','#c0392b','#d7bde2','#5dade2','#e91e63','#9b59b6'];

  const apply = (e, char = '✨') => {
    const rect = e.currentTarget.getBoundingClientRect();
    const cx = (e.touches?.[0]?.clientX || e.clientX) - rect.left;
    const cy = (e.touches?.[0]?.clientY || e.clientY) - rect.top;
    setSparkles(s => [...s, { id: Date.now() + Math.random(), x: (cx / rect.width) * 100, y: (cy / rect.height) * 100, char }].slice(-12));
    SOUNDS.brush(soundStyle);
    setPicks(p => ({ ...p, [tool]: true }));
  };

  const onHover = (e) => { if (e.buttons || e.touches) apply(e, '✨'); };

  return (
    <div className="w-full flex flex-col items-center gap-2">
      <ProgressBadge color="pink">💇‍♀️ Pick tool: {tools.find(t => t.id === tool).emoji}</ProgressBadge>
      <div className="relative" onMouseMove={onHover} onTouchMove={onHover}>
        <BarbieSVG b={{ ...b, hair, accessory: accessory || b.accessory }} size={220} />
        {sparkles.map(s => (
          <div key={s.id} className="absolute text-2xl pointer-events-none"
            style={{ left: `${s.x}%`, top: `${s.y}%`, animation: 'sparkleOut 1s ease-out forwards' }}>
            {s.char}
          </div>
        ))}
      </div>
      <div className="bg-white/70 backdrop-blur rounded-3xl p-3 max-w-md w-full">
        <div className="grid grid-cols-6 gap-2 mb-2">
          {tools.map(t => (
            <button key={t.id} onClick={() => { setTool(t.id); SOUNDS.click(soundStyle); }}
              className={`bg-white rounded-xl p-1.5 shadow border-2 ${tool === t.id ? 'border-pink-500 ring-2 ring-pink-300' : 'border-pink-200'} active:scale-95`}>
              <div className="text-2xl">{t.emoji}</div>
            </button>
          ))}
        </div>
        <div className="grid grid-cols-8 gap-1">
          {colors.map(c => (
            <button key={c} onClick={() => { setHair(c); SOUNDS.ding(soundStyle); setPicks(p => ({ ...p, dye: true })); }}
              className="w-9 h-9 rounded-full border-4 border-white shadow active:scale-90"
              style={{ backgroundColor: c }} />
          ))}
        </div>
        <button onClick={() => { setAccessory('bigBow'); SOUNDS.ding(soundStyle); setPicks(p => ({ ...p, bow: true })); }}
          className="w-full mt-2 bg-pink-100 border-2 border-pink-300 rounded-xl py-1 font-black text-pink-600 text-sm active:scale-95">
          Add a 🎀 Bow!
        </button>
      </div>

  );
}

// Freeze — pick a song first, then play the freeze game
function FreezeGame({ b, onWin, soundStyle }) {
  const songs = [
    { id:'twinkle', emoji:'🌟', label:'Twinkle', sound:'twinkle' },
    { id:'abc',     emoji:'🔤', label:'ABCs',    sound:'abc' },
    { id:'mary',    emoji:'🐑', label:"Mary",    sound:'marylamb' },
    { id:'row',     emoji:'🚣', label:'Row',     sound:'rowboat' },
  ];
  const [song, setSong] = useState(null);
  const [frozen, setFrozen] = useState(false);
  const [score, setScore] = useState(0);
  const target = 6;

  useEffect(() => {
    if (!song) return;
    if (score >= target) { setTimeout(onWin, 800); return; }
    const t = setTimeout(() => {
      setFrozen(f => {
        const nf = !f;
        if (nf) SOUNDS.freeze(soundStyle); else SOUNDS[song.sound](soundStyle);
        return nf;
      });
    }, frozen ? 1500 : 2200);
    return () => clearTimeout(t);
  }, [frozen, score, song]);

  if (!song) return (
    <div className="w-full flex flex-col items-center gap-3">
      <ProgressBadge color="cyan">❄️ Pick a song to dance to!</ProgressBadge>
      <BarbieSVG b={b} size={180} />
      <div className="bg-white/70 backdrop-blur rounded-3xl p-3 max-w-md w-full">
        <div className="grid grid-cols-2 gap-2">
          {songs.map(s => (
            <button key={s.id} onClick={() => { setSong(s); SOUNDS[s.sound](soundStyle); }}
              className="bg-white rounded-2xl p-4 shadow border-4 border-white active:scale-95">
              <div className="text-5xl">{s.emoji}</div>
              <div className="font-black text-pink-600">{s.label}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  return (
    <div className="w-full flex flex-col items-center gap-3">
      <div className={`rounded-full px-5 py-2 shadow-lg border-4 ${frozen ? 'bg-cyan-300 border-cyan-500' : 'bg-pink-200 border-pink-400'}`}>
        <span className="font-black text-xl">
          {frozen ? '❄️ FREEZE! Don\'t tap!' : '🎵 DANCE! Tap her!'}
        </span>
      </div>
      <div className="text-2xl font-black text-pink-600">Score: {score}/{target}</div>
      <button onClick={() => {
        if (frozen) { setScore(0); SOUNDS.freeze(soundStyle); }
        else { setScore(s => s + 1); SOUNDS.tap(soundStyle); }
      }} className="relative active:scale-95 transition-transform">
        <BarbieSVG b={b} anim={frozen ? '' : 'animate-bounce'} size={240} />
        {frozen && <div className="absolute inset-0 flex items-center justify-center text-9xl pointer-events-none">❄️</div>}
      </button>
    </div>
  );
}

}

// ============= MAIN APP =============
function App() {
  const [screen, setScreen] = useState('home');
  const [barbie, setBarbie] = useState(null);
  const [activity, setActivity] = useState(null);
  const [stars, setStars] = useState(0);
  const [soundStyle, setSoundStyle] = useState(DEFAULT_STYLE);

  useEffect(() => {
    // Load Fredoka font
    const fontId = 'fredoka-font';
    if (!document.getElementById(fontId)) {
      const link = document.createElement('link');
      link.id = fontId; link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap';
      document.head.appendChild(link);
    }

    // iPad-friendly viewport meta tag — disable pinch-zoom, handle notch
    const viewportId = 'ipad-viewport';
    let viewport = document.querySelector('meta[name="viewport"]');
    if (!viewport) {
      viewport = document.createElement('meta');
      viewport.name = 'viewport';
      document.head.appendChild(viewport);
    }
    viewport.setAttribute('content',
      'width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover');

    // PWA-style "Add to Home Screen" support for iPad
    const addMeta = (name, content) => {
      if (document.querySelector(`meta[name="${name}"]`)) return;
      const m = document.createElement('meta');
      m.name = name; m.content = content;
      document.head.appendChild(m);
    };
    addMeta('apple-mobile-web-app-capable', 'yes');
    addMeta('apple-mobile-web-app-status-bar-style', 'black-translucent');
    addMeta('apple-mobile-web-app-title', 'Barbie World');

    // Initialize audio on first tap (iOS Safari requires user gesture)
    const unlockAudio = () => {
      try { getCtx(); } catch (e) {}
      document.removeEventListener('touchend', unlockAudio);
      document.removeEventListener('click', unlockAudio);
    };
    document.addEventListener('touchend', unlockAudio, { once: true });
    document.addEventListener('click', unlockAudio, { once: true });

    // Prevent accidental pinch-zoom & double-tap-zoom on iPad
    const preventGesture = (e) => e.preventDefault();
    document.addEventListener('gesturestart', preventGesture);
    document.addEventListener('gesturechange', preventGesture);
    document.addEventListener('gestureend', preventGesture);
    return () => {
      document.removeEventListener('gesturestart', preventGesture);
      document.removeEventListener('gesturechange', preventGesture);
      document.removeEventListener('gestureend', preventGesture);
    };
  }, []);

  const handleActivityDone = () => {
    setStars(s => s + 1);
    setActivity(null);
    setScreen('activities');
  };

  return (
    <div
      className="bg-pink-100 overflow-y-auto"
      style={{
        fontFamily: 'Fredoka, "Comic Sans MS", system-ui',
        // Lock to viewport - top, left, right, bottom = 0
        position: 'fixed',
        top: 0,
        left: 0,
        right: 0,
        bottom: 0,
        width: '100vw',
        height: '100vh',
        // dvh for newer iPads handling Safari URL bar
        minHeight: '100dvh',
        margin: 0,
        padding: 0,
        // iPad touch behavior tweaks
        WebkitTapHighlightColor: 'transparent',
        WebkitTouchCallout: 'none',
        WebkitUserSelect: 'none',
        userSelect: 'none',
        overscrollBehavior: 'none',
        WebkitOverflowScrolling: 'touch',
        touchAction: 'manipulation',
        // Force its own stacking context (escapes parent transforms/filters)
        transform: 'translateZ(0)',
        zIndex: 9999,
      }}
    >
      <style>{`
        /* AGGRESSIVE fullscreen reset */
        html, body, #root, #__next, [data-reactroot] {
          margin: 0 !important;
          padding: 0 !important;
          width: 100% !important;
          height: 100% !important;
          min-height: 100vh !important;
          min-height: 100dvh !important;
          overflow: hidden !important;
          position: relative !important;
        }
        body { background: #fce7f3 !important; }
        /* Kill Safari's address bar reservation */
        @supports (height: 100dvh) {
          html, body { height: 100dvh !important; }
        }
        /* Touch tweaks */
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        button, a { touch-action: manipulation; }
        button:focus { outline: none; }
        input, select, textarea { font-size: 16px; }

        @keyframes floaty { 0%,100% { transform: translateY(0) rotate(0); opacity: 0.5; } 50% { transform: translateY(-30px) rotate(15deg); opacity: 0.9; } }
        @keyframes pop { 0%,100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.1) rotate(5deg); } }
        @keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes wiggle { 0%,100% { transform: rotate(-6deg); } 50% { transform: rotate(6deg); } }
        @keyframes butterfly { 0%,100% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(-15px) rotate(10deg); } }
        @keyframes confettiFall { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        @keyframes sparkleOut { 0% { transform: scale(0.3); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-80px) scale(1.5); opacity: 0; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes sway { 0%,100% { transform: translateX(-8px) rotate(-3deg); } 50% { transform: translateX(8px) rotate(3deg); } }
        @keyframes jump { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }
        @keyframes bend { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.85); } }
        @keyframes bubbleUp { 0% { opacity: 1; } 100% { opacity: 0; transform: translateY(-15px); } }
      `}</style>
      {screen === 'home' && <HomeScreen onStart={() => setScreen('barbies')} stars={stars} soundStyle={soundStyle} setSoundStyle={setSoundStyle} />}
      {screen === 'barbies' && <BarbieGrid onPick={(b) => { setBarbie(b); setScreen('activities'); }} onBack={() => setScreen('home')} stars={stars} />}
      {screen === 'activities' && barbie && <ActivityGrid b={barbie} onPick={(a) => { setActivity(a); setScreen('playing'); }} onBack={() => { setBarbie(null); setScreen('barbies'); }} stars={stars} />}
      {screen === 'playing' && barbie && activity && <ActivityScene b={barbie} activity={activity} onDone={handleActivityDone} soundStyle={soundStyle} stars={stars} />}
    </div>
  );
}
